<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | Click & Fix Technologies</title>

    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" href="../assets/img/favicon.png">

    <!-- Bootstrap CSS -->
    <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

    <!-- Admin CSS -->
    <link href="css/admin.css" rel="stylesheet">

</head>

<body>

    <main id="main" class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="main-container">
        
        <!-- Login Form Section -->
        <div class="form-section">
            <h3 class="mb-4 text-center">Admin Login</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password">
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Remember Me</label>
                    </div>
                    <a href="#">Forgot Password?</a>
                </div>
                <div class="alert alert-danger d-none" id="loginError">Invalid Email or Password.</div>
                <button class="btn btn-primary w-100" id="loginBtn" type="submit">Login</button>
            </form>
        </div>

        <!-- Right Decoration Section -->
        <div class="overlay-section">
            <div class="overlay-content">
                <h1 class="fw-bold">Click & Fix Technologies</h1>
                <p>Service Management Portal</p>
            </div>
        </div>

    </div>
</main>

    <!-- Bootstrap JS -->
    <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Admin JS -->
    <script type="module" src="js/admin.js"></script>

</body>

</html>
